services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports: ["8080:8080"]
    environment:
      - SEARCH_HELIX__DATABASE__PATH=/data/index
      - SEARCH_HELIX__SERVER__HOST=0.0.0.0
      - SEARCH_HELIX__SERVER__PORT=8080
    volumes:
      - index-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "2", memory: 2G }
        reservations: { cpus: "0.5", memory: 512M }
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
    depends_on: [backend]
    restart: unless-stopped

volumes:
  index-data:
